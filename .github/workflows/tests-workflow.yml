name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-and-tidy:
    name: Verify Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: interactsh-srv/go.mod

      - name: Set up golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.10.1/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.10.1

      - name: Run lint check
        run: make lint

      - name: Run tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          cd interactsh-srv && go mod tidy
          git diff --exit-code -- interactsh-srv/go.mod interactsh-srv/go.sum

  build:
    name: Verify Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: interactsh-srv/go.mod

      - name: Build binaries
        run: make build

      - name: Verify interactsh-lite size
        run: |
          size=$(stat --format=%s bin/interactsh-lite)
          max=$((10 * 1000 * 1000))
          echo "interactsh-lite size: $((size / 1000 / 1000))MB ($size bytes)"
          if [ "$size" -gt "$max" ]; then
            echo "ERROR: interactsh-lite exceeds 10MB limit"
            exit 1
          fi

      - name: Verify interactsh-srv size
        run: |
          size=$(stat --format=%s bin/interactsh-srv)
          max=$((20 * 1000 * 1000))
          echo "interactsh-srv size: $((size / 1000 / 1000))MB ($size bytes)"
          if [ "$size" -gt "$max" ]; then
            echo "ERROR: interactsh-srv exceeds 20MB limit"
            exit 1
          fi

  test:
    name: Verify Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
        - '1.26'
        - '1.25'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Run unit tests
        run: make test
